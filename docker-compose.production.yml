version: '3'

volumes:
  pg_data:
  static:
  media:
services:
  db:
    image: postgres:13
    volumes:
      - pg_data:/var/lib/postgresql/data
    env_file: ./.env
  backend:
    image: t1max/foodgram_backend
    env_file: ./.env
    depends_on:
      - db
    volumes:
      - static:/backend_static
      - media:/app/media/
  frontend:
    image: t1max/foodgram_frontend
    env_file: ./.env
    depends_on:
      - backend
    command: cp -r /app/build/. /static/
    volumes:
      - static:/static/
  nginx:
    image: t1max/foodgram_nginx
    env_file: ./.env
    depends_on:
      - frontend
      - backend
    ports:
      - "8000:80"
    volumes:
      - static:/staticfiles
      - media:/media/