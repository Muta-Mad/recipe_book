[flake8]
ignore = 
    W503,
    F811
exclude = 
    tests/,
    */migrations/,
    venv/,
    */venv/,
    env/,
    */env/,
per-file-ignores =
    */settings.py:E501
    backend/manage.py:E501

[isort]
known_first_party = users, recipes, api
lines_between_types = 1 
skip = 
    tests/,
    */migrations/,
    venv/,
    */venv/,
    env/,
    */env/,
    backend/foodgram_backend/venv/
    backend/foodgram_backend/recipes/migrations/