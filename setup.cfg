[flake8]
max-line-length = 88
ignore =
    W503,
    F811
exclude =
    */tests/*,
    */migrations/,
    venv/,
    */venv/,
    env/,
    */env/,

[isort]
known_first_party = users, recipes, api
lines_between_types = 1
skip =
    tests/,
    */migrations/,
    venv/,
    */venv/,
    env/,
    */env/,
    backend/foodgram_backend/venv/
    backend/foodgram_backend/recipes/migrations/

[tool:pytest]
DJANGO_SETTINGS_MODULE = foodgram_backend.settings
python_files = test_*.py
python_classes = Test
python_functions = test_
testpaths = backend/tests
python_paths = backend
addopts = --strict-markers -v --cov=api --cov=recipes --cov=users --cov-report=term-missing
markers =
    slow: marks tests as slow
    integration: marks tests as integration tests